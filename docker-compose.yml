services:
  broker:
    image: docker.io/library/redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
    volumes:
      - "data:/usr/src/paperless/data"
      - "media:/usr/src/paperless/media"
      - "./export:/usr/src/paperless/export"
      - "${PAPERLESS_CONSUME_DIR}:/usr/src/paperless/consume"
      - "${PAPERLESS_CONSUME_DIR_MONEYMONEY}:/usr/src/paperless/consume/moneymoney"
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_URL: https://${TRAEFIK_HOST}
      PAPERLESS_TASK_WORKERS: 4
      PAPERLESS_THREADS_PER_WORKER: 4
      PAPERLESS_CONSUMER_POLLING: 10
      PAPERLESS_CONSUMER_RECURSIVE: ${PAPERLESS_CONSUMER_RECURSIVE:-true}
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true

      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.service=${COMPOSE_PROJECT_NAME}
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=8000

  # Backup service: borgmatic with native PostgreSQL dump support
  backup:
    build: ./backup
    restart: unless-stopped
    depends_on:
      - db
    environment:
      BORG_REPO: ${BORG_REPO}
      BORG_PASSPHRASE: ${BORG_PASSPHRASE}
      PGHOST: db
      PGUSER: paperless
      PGDATABASE: paperless
      PGPASSWORD: paperless
    volumes:
      - ./backup:/backup:rw
      - ./backup/.ssh:/root/.ssh:ro
      - data:/data:ro
      - media:/media:ro
    command: ["/backup/entrypoint.sh"]
    networks:
      - default

volumes:
  data:
  media:
  pgdata:
  redisdata:

networks:
  traefik:
    external: true
